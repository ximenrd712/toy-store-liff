<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>庫存作業登入中</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      background: #4f7df0;
      color: #fff;
      padding: 28px;
    }

    .header h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
    }

    .header p {
      margin: 8px 0 0;
      font-size: 15px;
      opacity: 0.95;
    }

    .content {
      padding: 18px;
    }

    .box {
      background: #f9fafb;
      border-radius: 16px;
      padding: 18px;
      line-height: 1.8;
      font-size: 16px;
      text-align: center;
      color: #374151;
    }

    .error-box {
      background: #fef2f2;
      color: #b91c1c;
      border-radius: 14px;
      padding: 14px;
      line-height: 1.8;
      font-size: 15px;
      display: none;
      margin-top: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <h1>登入中</h1>
        <p>正在確認 LINE 身分，請稍候…</p>
      </div>

      <div class="content">
        <div id="statusBox" class="box">正在登入庫存作業…</div>
        <div id="errorBox" class="error-box"></div>
      </div>
    </div>
  </div>

  <script>
    const LIFF_ID = '2009801246-yZhuY1HJ';
    const GAS_EXEC_URL = 'https://script.google.com/macros/s/AKfycbwOb9J9YoMIMVoonCTt_UZvIDKC8MfXWPkymjMHS5tseJZ2kfhEVvghMnO5173mju7vtQ/exec';

    function setStatus(msg) {
      document.getElementById('statusBox').textContent = msg;
    }

    function showError(msg) {
      const el = document.getElementById('errorBox');
      el.style.display = 'block';
      el.textContent = msg;
    }

    async function startInventoryLiff() {
      try {
        setStatus('正在確認 LINE 身分…');

        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });

        await liff.ready;

        if (!liff.isLoggedIn()) {
          setStatus('正在跳轉登入…');
          liff.login({
            redirectUri: window.location.href
          });
          return;
        }

        const profile = await liff.getProfile();
        const lineUserId = profile && profile.userId ? profile.userId : '';

        if (!lineUserId) {
          throw new Error('取得不到 LINE 身分，請重新開啟一次');
        }

        setStatus('登入成功，正在進入庫存作業…');

        const targetUrl =
          GAS_EXEC_URL +
          '?page=inventoryForm' +
          '&lineUserId=' + encodeURIComponent(lineUserId) +
          '&v=20260423';

        setTimeout(function() {
          window.location.replace(targetUrl);
        }, 300);

      } catch (err) {
        showError(
          '登入失敗，請關閉後重新開啟。\n' +
          (err && err.message ? err.message : String(err))
        );
      }
    }

    window.addEventListener('load', startInventoryLiff);
  </script>
</body>
</html>
