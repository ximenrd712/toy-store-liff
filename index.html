<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>員工系統登入</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
      color: #374151;
      padding: 28px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .header p {
      margin: 8px 0 0;
      font-size: 14px;
      opacity: 0.95;
    }

    .content {
      padding: 18px;
    }

    .box {
      background: #f9fafb;
      border-radius: 16px;
      padding: 16px;
      line-height: 1.8;
      font-size: 15px;
      margin-bottom: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .error-box {
      background: #fef2f2;
      color: #b91c1c;
      border-radius: 14px;
      padding: 14px;
      line-height: 1.8;
      font-size: 15px;
      display: none;
      margin-top: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <h1>登入中</h1>
        <p>正在確認 LINE 身分，請稍候…</p>
      </div>

      <div class="content">
        <div id="statusBox" class="box">初始化中…</div>
        <div id="errorBox" class="error-box"></div>
      </div>
    </div>
  </div>

<script>
  const LIFF_ID = '2009801246-BydKmWLO';
  const EXEC_URL = 'https://script.google.com/macros/s/AKfycbwOb9J9YoMIMVoonCTt_UZvIDKC8MfXWPkymjMHS5tseJZ2kfhEVvghMnO5173mju7vtQ/exec';

  function getMergedLiffParams() {
    var params = new URLSearchParams(window.location.search);
    var merged = {};

    params.forEach(function(value, key) {
      merged[key] = value;
    });

    var liffState =
      params.get('liff.state') ||
      params.get('liffState') ||
      params.get('state') ||
      '';

    if (liffState) {
      var stateText = String(liffState || '').trim();

      if (stateText.indexOf('?') > -1) {
        stateText = stateText.substring(stateText.indexOf('?') + 1);
      } else if (stateText.indexOf('/') === 0) {
        stateText = stateText.substring(1);
      }

      if (stateText.indexOf('#') > -1) {
        stateText = stateText.substring(0, stateText.indexOf('#'));
      }

      var stateParams = new URLSearchParams(stateText);

      stateParams.forEach(function(value, key) {
        merged[key] = value;
      });
    }

    return merged;
  }

  const mergedParams = getMergedLiffParams();

  const TARGET_PAGE =
    mergedParams.targetPage ||
    mergedParams.page ||
    'home';

  const STORE =
    mergedParams.store ||
    'ximen';

  const CODE =
    mergedParams.code ||
    '';

  function setStatus(msg) {
    var el = document.getElementById('statusBox');

    if (el) {
      el.textContent = msg;
    }
  }

  function showError(msg) {
    var el = document.getElementById('errorBox');

    if (el) {
      el.style.display = 'block';
      el.textContent = msg;
      return;
    }

    alert(msg);
  }

  function buildCurrentGithubRedirectUrl() {
    var stateText =
      'targetPage=' + encodeURIComponent(TARGET_PAGE) +
      '&store=' + encodeURIComponent(STORE);

    if (CODE) {
      stateText += '&code=' + encodeURIComponent(CODE);
    }

    return (
      window.location.origin +
      window.location.pathname +
      '?state=' + encodeURIComponent(stateText)
    );
  }

  function buildAppsScriptTargetUrl(lineUserId) {
    var url =
      EXEC_URL +
      '?page=' + encodeURIComponent(TARGET_PAGE) +
      '&store=' + encodeURIComponent(STORE);

    if (CODE) {
      url += '&code=' + encodeURIComponent(CODE);
    }

    if (lineUserId) {
      url += '&lineUserId=' + encodeURIComponent(lineUserId);
    }

    url += '&t=' + new Date().getTime();

    return url;
  }

  async function initLiffEntry() {
    try {
      setStatus('登入中，正在確認 LINE 身分...');

      if (!EXEC_URL || EXEC_URL.indexOf('script.google.com') === -1) {
        throw new Error('EXEC_URL 尚未設定成 Apps Script /exec 網址');
      }

      await liff.init({
        liffId: LIFF_ID,
        withLoginOnExternalBrowser: true
      });

      await liff.ready;

      if (!liff.isLoggedIn()) {
        liff.login({
          redirectUri: buildCurrentGithubRedirectUrl()
        });

        return;
      }

      setStatus('登入成功，正在進入系統...');

      var profile = await liff.getProfile();
      var lineUserId = profile && profile.userId ? profile.userId : '';
      var targetUrl = buildAppsScriptTargetUrl(lineUserId);

      window.location.replace(targetUrl);

    } catch (err) {
      showError(
        'LIFF 入口失敗：\n' +
        (err && err.message ? err.message : String(err))
      );
    }
  }

  window.addEventListener('load', initLiffEntry);
</script>
</body>
</html>
