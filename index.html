<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>員工系統登入</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <p id="status">登入中...</p>

<script>
const LIFF_ID = "2009801246-BydKmWLO";
const GAS_URL = "https://script.google.com/macros/s/AKfycbwOb9J9YoMIMVoonCTt_UZvIDKC8MfXWPkymjMHS5tseJZ2kfhEVvghMnO5173mju7vtQ/exec";

async function main() {
  try {
    document.getElementById("status").innerText = "初始化 LIFF 中...";

    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      document.getElementById("status").innerText = "導向 LINE 登入...";
      liff.login();
      return;
    }

    document.getElementById("status").innerText = "登入成功，導向中...";

    const profile = await liff.getProfile();

    const params = new URLSearchParams(window.location.search);
    const target = params.get("target") || "home";
    const store  = params.get("store") || "";

    const pageMap = {
      home: "home",
      checkout: "checkoutHome",
      product: "productHome",
      store: "storeHome"
    };

    const page = pageMap[target] || "home";

    let redirectUrl =
      `${GAS_URL}?page=${page}&lineUserId=${encodeURIComponent(profile.userId)}`;

    if (store) {
      redirectUrl += `&store=${encodeURIComponent(store)}`;
    }

    redirectUrl += `&t=${Date.now()}`;

    location.replace(redirectUrl);

  } catch (err) {
    document.getElementById("status").innerText =
      "登入失敗：" + err.message;
  }
}

main();
</script>
</body>
</html>
