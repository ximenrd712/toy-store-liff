<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商品 QR 入口</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      font-family: Arial, "Noto Sans TC", sans-serif;
      color: #111827;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .status {
      font-size: 14px;
      color: #9ca3af;
      text-align: center;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .error-box {
      display: none;
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 20px;
      border-radius: 14px;
      background: #fef2f2;
      color: #b91c1c;
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="statusBox" class="status">載入中...</div>
    <div id="errorBox" class="error-box"></div>
  </div>

  <script>
    const LIFF_ID = "2009801246-nG9E3mGI";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwOb9J9YoMIMVoonCTt_UZvIDKC8MfXWPkymjMHS5tseJZ2kfhEVvghMnO5173mju7vtQ/exec";

    async function main() {
      try {
        await liff.init({
          liffId: LIFF_ID
        });

        if (!liff.isLoggedIn()) {
          liff.login({
            redirectUri: window.location.href
          });
          return;
        }

        const profile = await liff.getProfile();
        const lineUserId = profile && profile.userId ? String(profile.userId) : "";

        if (!lineUserId) {
          throw new Error("無法取得 LINE userId");
        }

        const params = new URLSearchParams(window.location.search);
        const code = (params.get("code") || "").trim();
        const store = (params.get("store") || "").trim();
        const targetPage = (params.get("targetPage") || "productPage").trim();

        if (!code) {
          throw new Error("缺少 code，無法進入商品頁");
        }

        let redirectUrl =
          `${GAS_URL}?page=${encodeURIComponent(targetPage)}` +
          `&lineUserId=${encodeURIComponent(lineUserId)}` +
          `&code=${encodeURIComponent(code)}` +
          `&t=${Date.now()}`;

        if (store) {
          redirectUrl += `&store=${encodeURIComponent(store)}`;
        }

        location.replace(redirectUrl);

      } catch (err) {
        showError("登入失敗：\n" + (err && err.message ? err.message : String(err)));
      }
    }

    function showError(msg) {
      document.getElementById("statusBox").style.display = "none";
      const el = document.getElementById("errorBox");
      el.style.display = "block";
      el.textContent = msg;
    }

    main();
  </script>
</body>
</html>
